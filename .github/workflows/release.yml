name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          bun run build
          mkdir -p release
          cp dist/nathan release/nathan
          chmod +x release/nathan
          tar -czf release/nathan.tar.gz -C release nathan
          cd release && sha256sum nathan.tar.gz > checksums.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/nathan.tar.gz \
            release/checksums.txt

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA=$(awk '{print $1}' release/checksums.txt)
          REPO_URL="https://github.com/lifedraft/nathan/releases/download/v${VERSION}"

          cat > formula.rb << FORMULA
          class Nathan < Formula
            desc "Pluggable CLI that turns popular services into simple, scriptable commands"
            homepage "https://github.com/lifedraft/nathan"
            version "${VERSION}"
            license "MIT"

            depends_on "oven-sh/bun/bun"

            url "${REPO_URL}/nathan.tar.gz"
            sha256 "${SHA}"

            def install
              bin.install "nathan"
            end

            test do
              system "#{bin}/nathan", "discover"
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' formula.rb

          # Clone tap repo and push updated formula
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/lifedraft/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp formula.rb tap/Formula/nathan.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nathan.rb
          git commit -m "nathan ${VERSION}"
          git push
